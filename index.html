<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>라인 관제탑 · 상태</title><style>
:root{--bg:#0d1117;--p:#161b22;--l:#21262d;--t:#e6edf3;--m:#8b949e;--pos:#3fb950;--neg:#f85149;--am:#d29922}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--t);font-family:-apple-system,"Malgun Gothic",sans-serif;padding:18px;max-width:520px;margin:auto}
h1{font-size:18px;margin:4px 0 2px}.sub{color:var(--m);font-size:12px;margin-bottom:14px}
.sum{display:flex;gap:14px;font-size:15px;margin:10px 0 16px;flex-wrap:wrap}.sum b{font-family:Consolas,monospace}
.row{display:flex;align-items:center;gap:12px;background:var(--p);border:1px solid var(--l);border-radius:10px;padding:13px 15px;margin-bottom:9px}
.nm{flex:1;font-size:15px}.dir{font-size:17px;font-weight:700}
.led{width:13px;height:13px;border-radius:50%;flex:0 0 auto}.led.g{background:var(--pos);box-shadow:0 0 8px var(--pos)}.led.a{background:var(--am)}.led.r{background:var(--neg)}.led.u{background:#484f58}
.pos{color:var(--pos)}.neg{color:var(--neg)}
footer{color:var(--m);font-size:11px;margin-top:16px;line-height:1.6;text-align:center}
</style></head><body>
<h1>🛰 라인 관제탑 · 시스템 상태</h1>
<div class="sub">최종 갱신 2026-06-22 16:00</div>
<div class="sum"><span>🟢 정상 <b>10</b></span><span>🟡 점검 <b>0</b></span><span>🔴 확인 <b>0</b></span><span style="color:var(--m)">준비중 <b>1</b></span></div>
<div class="row"><span class="led g"></span><span class="nm">전략 1</span><span class="dir neg">▼</span></div>
<div class="row"><span class="led g"></span><span class="nm">전략 2</span><span class="dir neg">▼</span></div>
<div class="row"><span class="led g"></span><span class="nm">전략 3</span><span class="dir pos">▲</span></div>
<div class="row"><span class="led g"></span><span class="nm">전략 4</span><span class="dir neg">▼</span></div>
<div class="row"><span class="led g"></span><span class="nm">전략 5</span><span class="dir neg">▼</span></div>
<div class="row"><span class="led g"></span><span class="nm">전략 6</span><span class="dir pos">▲</span></div>
<div class="row"><span class="led g"></span><span class="nm">전략 7</span><span class="dir neg">▼</span></div>
<div class="row"><span class="led g"></span><span class="nm">전략 8</span><span class="dir pos">▲</span></div>
<div class="row"><span class="led g"></span><span class="nm">전략 9</span><span class="dir pos">▲</span></div>
<div class="row"><span class="led g"></span><span class="nm">전략 10</span><span class="dir pos">▲</span></div>
<footer>내부 시스템 가동 현황 (가상 시뮬레이션)<br>실제 운용자금이 아니며, 특정 종목의 매수·매도 추천이 아닙니다</footer>
</body></html>
